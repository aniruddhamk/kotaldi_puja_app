<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kotaldi Puja App{% endblock %}</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- SVG Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header class="header">
        <nav class="nav">
            <a href="/" class="logo">
                <i data-lucide="flower-2"></i> Kotaldi Puja
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/add" class="nav-link">Add Collection</a>
                <a href="/view/monthly" class="nav-link">Monthly</a>
                <a href="/view/individual" class="nav-link">Individual</a>
            </div>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Built for the people of Kotaldi • Track & Manage Puja Contributions transparently</p>
    </footer>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
